{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'core/css/forms.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">
    <h2>Recuperar senha</h2>

    <p>Esqueceu sua senha? Digite seu endereço de e-mail abaixo e nós enviaremos instruções para definir uma nova senha.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar e-mail de recuperação</button>
    </form>
</div>

{% endblock %}
