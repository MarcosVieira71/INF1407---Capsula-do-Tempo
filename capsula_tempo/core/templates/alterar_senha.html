{% extends 'base.html' %}

{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'core/css/forms.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">
    <h2>Alterar Senha</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar nova senha</button>
    <a href="{% url 'perfil' %}">Cancelar</a>
</form>
</div>

{% endblock %}
