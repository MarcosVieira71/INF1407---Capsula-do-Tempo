{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'core/css/forms.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">
    <h2>Editar perfil</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>

    <div>
        <a href="{% url 'alterar_senha' %}">
            Alterar senha
        </a>
    </div>

    <div style="margin-top: 1em;">
        <a href="{% url 'perfil_excluir' %}" style="display:inline-block;background:#c94b4b;color:white;text-decoration:none;padding:8px 12px;border-radius:4px;">Excluir conta</a>
    </div>
</div>

{% endblock %}
