{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'core/css/forms.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">
    <h2>Editar perfil</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>

    <div>
        <a href="{% url 'alterar_senha' %}">
            Alterar senha
        </a>
    </div>
</div>

{% endblock %}
